# hf_space below is the PRODUCTION target and the safe default.
# To point a dev deployment at a dev specialist Space, set an env var
# HF_SPACE_<ID> (id upper-cased) instead of editing this file — e.g. on the
# research_coordinator_dev Space set:
#   HF_SPACE_DECOUPLERPY=anne-voigt/Paper2Agent_decoupleRpy_dev
# Keeping the override in env (not here) means promoting dev -> main never
# repoints prod. Resolution lives in router.py:_resolve_hf_space().
agents:
  - id: decouplerpy
    name: "DecoupleRpy Agent"
    description: "Bulk RNA-seq analysis: differential expression, TF activity (CollecTRI), pathway scoring (PROGENy), gene set enrichment (Hallmark/MSigDB), GEO data loading"
    hf_space: "anne-voigt/Paper2Agent_decoupleRpy"
    trigger_keywords:
      - "differential expression"
      - "DE analysis"
      - "TF activity"
      - "transcription factor"
      - "PROGENy"
      - "pathway"
      - "Hallmark"
      - "gene set"
      - "enrichment"
      - "CollecTRI"
      - "how many samples"
      - "tumor subtype"
      - "classical"
      - "basal"
      - "GEO"
      - "GSE"
      - "load dataset"
      - "metadata"
    capabilities:
      - bulk_rna_de
      - tf_enrichment
      - pathway_scoring
      - gene_set_enrichment
      - geo_data_loading
      - metadata_queries
