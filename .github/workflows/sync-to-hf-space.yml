name: Sync to HF Space

# Mirrors origin/main to the research-coordinator HF Space (the `hf` git
# remote) on every push to main, so the live Space can never silently drift
# behind GitHub again.
#
# One-time setup (not done by this workflow):
#   1. Create a HF token with write access to anne-voigt/research_coordinator
#      at https://huggingface.co/settings/tokens
#   2. Add it as a repository secret named HF_TOKEN:
#      Settings -> Secrets and variables -> Actions -> New repository secret
#      (or: gh secret set HF_TOKEN -R avoigt1121/research-coordinator)
#
# After setup, `origin` is the source of truth. Do not push directly to the
# `hf` remote -- the next push to main will force-overwrite it.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync-to-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Pushes can cluster (several commits in quick succession). HF's git
          # backend may reject a force-push while the Space is still rebuilding
          # from the previous push, making git exit 128 transiently. Retry with
          # backoff so a momentary rejection self-recovers in the same run
          # instead of leaving a spurious red X.
          remote="https://anne-voigt:${HF_TOKEN}@huggingface.co/spaces/anne-voigt/research_coordinator"
          for attempt in 1 2 3; do
            if git push --force "$remote" main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Push still failing after 3 attempts."
          exit 1
